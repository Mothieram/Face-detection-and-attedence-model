# ============================================================
# nginxExample.conf
# Face Recognition Attendance System — nginx configuration
#
# HOW TO USE
#   1. Copy this file to: C:\Program Files\nginx\conf\nginx.conf
#   2. Replace YOUR_LAN_IP with your actual LAN IP (run: ipconfig)
#   3. Generate SSL certificate (see nginx-setup.ps1)
#   4. Run nginx.exe as Administrator
#
# REQUIREMENTS
#   - nginx for Windows: https://nginx.org/en/download.html
#   - SSL certificate at: C:\nginx\ssl\faceid.crt and faceid.key
#   - FastAPI running on: http://127.0.0.1:8000
# ============================================================


worker_processes  1;

# error_log  logs/error.log;
# error_log  logs/error.log  notice;
# error_log  logs/error.log  info;

# pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    # log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                   '$status $body_bytes_sent "$http_referer" '
    #                   '"$http_user_agent" "$http_x_forwarded_for"';

    # access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Increase upload size to match FastAPI 10 MB limit ──
    client_max_body_size 10M;

    # ── HTTP → HTTPS redirect ──────────────────────────────
    # Uncomment this block if port 80 is available on your machine.
    # If port 80 is blocked by IIS or another service, leave commented
    # and access directly via https://YOUR_LAN_IP
    #
    # server {
    #     listen       80;
    #     server_name  localhost faceid.local YOUR_LAN_IP;
    #     return 301   https://$host$request_uri;
    # }

    # ── HTTPS reverse proxy → FastAPI ──────────────────────
    server {
        listen       443 ssl;

        # Replace YOUR_LAN_IP with your actual LAN IP
        # Example: server_name localhost faceid.local 192.168.1.113;
        server_name  localhost faceid.local YOUR_LAN_IP;

        # SSL certificate paths
        # Generate with nginx-setup.ps1 or manually with openssl
        ssl_certificate      C:/nginx/ssl/faceid.crt;
        ssl_certificate_key  C:/nginx/ssl/faceid.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Proxy all requests to FastAPI ──────────────────
        location / {
            proxy_pass          http://127.0.0.1:8000;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            # Timeouts — ML inference can take a few seconds
            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

}